apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gateway-2
  namespace: test-gtw
  labels:
    app.kubernetes.io/part-of: test-run-gateway
    # Matches catalog Resource metadata.annotations['backstage.io/kubernetes-id']
    # so the entity Kubernetes tab can find this Gateway (valid label value).
    backstage.io/kubernetes-id: gateway-2
  annotations:
    # Full catalog ref cannot be a label (':' is invalid in label values).
    backstage.io/catalog-entity: resource:default/gateway-2
spec:
  gatewayClassName: istio
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
